# ── GITHUB ACTIONS: CI/CD PIPELINE ──
# Runs on every push to main:
#   1. Lint the code
#   2. Run tests
#   3. Build the project
#   4. Deploy to GitHub Pages automatically
#
# Runs on every Pull Request:
#   1. Lint + test only (no deploy)

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Lint & Test ──
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # ── JOB 2: Build & Deploy (only on push to main) ──
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test                        # only runs if test job passes
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write                   # needed to push to gh-pages branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Add your env vars here (set them in GitHub repo Settings > Secrets)
          # VITE_API_URL: ${{ secrets.VITE_API_URL }}
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # SPA routing: serve index.html for all routes
          force_orphan: true
